<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>AI Resume Analyzer Dashboard</h1>

<h3>Upload Resume</h3>


<hr>

<h3>Previous Analysis</h3>
<ul>
    <li th:each="h : ${history}">
        <span th:text="${h.fileName}"></span>
        -
        ATS Score:
        <span th:text="${h.atsScore}"></span>

        <a th:href="@{/deleteHistory/{id}(id=${h.id})}">Delete</a>
    </li>
    <li>Resume2.pdf - ATS Score 78%</li>
</ul>
<h3>Paste Job Description</h3>
<form id="resumeForm"
      action="/upload"
      method="post"
      enctype="multipart/form-data">
    <input type="file" name="file">

    <br><br>
<textarea name="jobDescription"
          rows="8"
          cols="70"
          placeholder="Paste job Description here..."></textarea>
    <br><br>
    <button type="submit">Analyze Resume</button>


</body>
</html>
